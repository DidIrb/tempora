version: '3.8'

services:
  db:
    image: mysql:8
    container_name: express_mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: express_mysql_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: express_mysql_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: mysql://appuser:apppassword@db:3306/express_mysql_db
      JWT_SECRET: change_this_in_production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: development
    volumes:
      # Hot reload: mount source so ts-node-dev picks up changes
      - .:/app
      - /app/node_modules

volumes:
  mysql_data:
